apiVersion: 1
groups:
  - orgId: 1
    name: mvision-live-platform
    folder: Mvision
    interval: 1m
    rules:
      - uid: live-worker-down
        title: Live worker is down
        condition: B
        for: 2m
        noDataState: Alerting
        execErrState: Error
        annotations: {summary: "The live worker is unavailable."}
        labels: {severity: critical, category: availability}
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 300, to: 0}
            model: {expr: "mvision_live_worker_up", instant: true, refId: A}
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              refId: B
              type: threshold
              expression: A
              conditions:
                - {type: query, query: {params: [B]}, reducer: {type: last, params: []}, evaluator: {type: lt, params: [1]}, operator: {type: and}}
      - uid: live-no-frames
        title: Live stream has no frames
        condition: B
        for: 2m
        noDataState: Alerting
        execErrState: Error
        annotations: {summary: "No decoded frames are arriving."}
        labels: {severity: critical, category: ingest}
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 300, to: 0}
            model: {expr: "rate(mvision_live_frames_total[2m])", instant: true, refId: A}
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model: {refId: B, type: threshold, expression: A, conditions: [{type: query, query: {params: [B]}, reducer: {type: last, params: []}, evaluator: {type: lte, params: [0]}, operator: {type: and}}]}
      - uid: live-stale-frame
        title: Live frame is stale
        condition: B
        for: 1m
        noDataState: Alerting
        execErrState: Error
        annotations: {summary: "Latest frame age exceeds five seconds."}
        labels: {severity: critical, category: latency}
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 300, to: 0}
            model: {expr: "mvision_live_frame_age_seconds", instant: true, refId: A}
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model: {refId: B, type: threshold, expression: A, conditions: [{type: query, query: {params: [B]}, reducer: {type: last, params: []}, evaluator: {type: gt, params: [5]}, operator: {type: and}}]}
      - uid: live-reconnect-storm
        title: Live reconnect storm
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        annotations: {summary: "Reconnect rate is elevated."}
        labels: {severity: warning, category: reconnect}
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model: {expr: "rate(mvision_live_reconnects_total[5m])", instant: true, refId: A}
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model: {refId: B, type: threshold, expression: A, conditions: [{type: query, query: {params: [B]}, reducer: {type: last, params: []}, evaluator: {type: gt, params: [0.1]}, operator: {type: and}}]}
      - uid: live-missing-embeddings
        title: Missing embeddings detected
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        annotations: {summary: "Embedding production is incomplete."}
        labels: {severity: warning, category: recognition}
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model: {expr: "rate(mvision_live_missing_embeddings_total[5m])", instant: true, refId: A}
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model: {refId: B, type: threshold, expression: A, conditions: [{type: query, query: {params: [B]}, reducer: {type: last, params: []}, evaluator: {type: gt, params: [0]}, operator: {type: and}}]}
      - uid: live-queue-pressure
        title: Live protocol queue pressure
        condition: B
        for: 2m
        noDataState: OK
        execErrState: Error
        annotations: {summary: "A bounded protocol queue is nearing capacity."}
        labels: {severity: warning, category: backpressure}
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 300, to: 0}
            model: {expr: "max(mvision_live_protocol_queue_depth)", instant: true, refId: A}
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model: {refId: B, type: threshold, expression: A, conditions: [{type: query, query: {params: [B]}, reducer: {type: last, params: []}, evaluator: {type: gt, params: [48]}, operator: {type: and}}]}
      - uid: live-dropped-events
        title: Live protocol events dropped
        condition: B
        for: 1m
        noDataState: OK
        execErrState: Error
        annotations: {summary: "The live protocol dropped bounded events."}
        labels: {severity: warning, category: backpressure}
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 300, to: 0}
            model: {expr: "sum(rate(mvision_live_protocol_dropped_total[5m]))", instant: true, refId: A}
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model: {refId: B, type: threshold, expression: A, conditions: [{type: query, query: {params: [B]}, reducer: {type: last, params: []}, evaluator: {type: gt, params: [0]}, operator: {type: and}}]}
      - uid: telemetry-export-failures
        title: Telemetry export failures
        condition: B
        for: 2m
        noDataState: OK
        execErrState: Error
        annotations: {summary: "An application telemetry exporter is failing."}
        labels: {severity: warning, category: telemetry}
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 300, to: 0}
            model: {expr: "sum(rate(mvision_telemetry_export_failures_total[5m]))", instant: true, refId: A}
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model: {refId: B, type: threshold, expression: A, conditions: [{type: query, query: {params: [B]}, reducer: {type: last, params: []}, evaluator: {type: gt, params: [0]}, operator: {type: and}}]}
      - uid: dependency-high-latency
        title: Dependency latency is high
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        annotations: {summary: "Dependency p95 latency exceeds one second."}
        labels: {severity: warning, category: dependency}
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: {from: 600, to: 0}
            model: {expr: "histogram_quantile(0.95, sum by (le) (rate(mvision_dependency_duration_seconds_bucket[5m])))", instant: true, refId: A}
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model: {refId: B, type: threshold, expression: A, conditions: [{type: query, query: {params: [B]}, reducer: {type: last, params: []}, evaluator: {type: gt, params: [1]}, operator: {type: and}}]}
