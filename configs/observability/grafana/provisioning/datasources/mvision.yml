apiVersion: 1
deleteDatasources:
  - {name: Prometheus, orgId: 1}
  - {name: Loki, orgId: 1}
  - {name: Tempo, orgId: 1}
datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      prometheusType: Prometheus
      prometheusVersion: 3.13.0
      timeInterval: 15s
      exemplarTraceIdDestinations:
        - {name: trace_id, datasourceUid: tempo}
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      derivedFields:
        - name: TraceID
          matcherRegex: 'trace_id[=:" ]+([0-9a-f]{32})'
          datasourceUid: tempo
          url: '$${__value.raw}'
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      httpMethod: GET
      nodeGraph:
        enabled: true
      serviceMap:
        datasourceUid: prometheus
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: -5m
        spanEndTimeShift: 5m
        filterByTraceID: true
        filterBySpanID: false
        customQuery: true
        query: '{service_name="$${__span.tags["service.name"]}"} | trace_id=`$${__trace.traceId}`'
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: -5m
        spanEndTimeShift: 5m
        tags:
          - {key: service.name, value: service}
        queries:
          - name: Request rate
            query: 'sum(rate(traces_span_metrics_calls_total{$$__tags}[5m]))'
          - name: Error rate
            query: 'sum(rate(traces_span_metrics_calls_total{$$__tags,status_code="STATUS_CODE_ERROR"}[5m]))'
