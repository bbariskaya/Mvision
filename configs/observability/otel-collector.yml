receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 384
    spike_limit_mib: 96
  attributes/privacy:
    actions:
      - {key: url.full, action: delete}
      - {key: url.path, action: delete}
      - {key: url.query, action: delete}
      - {key: server.address, action: delete}
      - {key: server.port, action: delete}
      - {key: network.peer.address, action: delete}
      - {key: client.address, action: delete}
      - {key: db.statement, action: delete}
      - {key: db.query.text, action: delete}
      - {key: enduser.id, action: delete}
      - {key: http.request.body, action: delete}
      - {key: http.response.body, action: delete}
  tail_sampling:
    decision_wait: 10s
    num_traces: 50000
    expected_new_traces_per_sec: 1000
    policies:
      - name: errors
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: reconnects
        type: string_attribute
        string_attribute:
          key: operation
          values: [reconnect]
      - name: slow-operations
        type: latency
        latency:
          threshold_ms: 2000
      - name: ordinary-success-10-percent
        type: probabilistic
        probabilistic:
          sampling_percentage: 10
  batch:
    timeout: 1s
    send_batch_size: 256
    send_batch_max_size: 1024

connectors:
  span_metrics:
    histogram:
      explicit:
        buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s]
    dimensions:
      - {name: operation}
      - {name: status}
  service_graph:
    latency_histogram_buckets: [100ms, 250ms, 500ms, 1s, 2s, 5s]
    dimensions:
      - operation

exporters:
  otlp_grpc/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 2048
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 5s
      max_elapsed_time: 30s
  otlp_http/loki:
    endpoint: http://loki:3100/otlp
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 2048
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 5s
      max_elapsed_time: 30s
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  telemetry:
    logs:
      level: info
    metrics:
      level: normal
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, attributes/privacy, tail_sampling, batch]
      exporters: [otlp_grpc/tempo, span_metrics, service_graph]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, attributes/privacy, batch]
      exporters: [otlp_http/loki]
    metrics:
      receivers: [span_metrics, service_graph]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
