services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mergen
      POSTGRES_PASSWORD: mergen
      POSTGRES_DB: mergenvision
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mergen -d mergenvision"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://mergen:mergen@postgres:5432/mergenvision
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: face_samples_arcface_r50_webface_v1
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_FACES: mergenvision-faces
      MODEL_VERSION: arcface_r50_webface4m_v1
      PREPROCESS_VERSION: five-point-umeyama-112x112
      DETECTOR_VERSION: yolov8n-face-v1
      ALIGNMENT_VERSION: umeyama-5point-112x112
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/pyproject.toml:/app/pyproject.toml:ro
      - ./backend/tests:/app/tests:ro

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
