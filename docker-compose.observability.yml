services:
  api:
    environment:
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_healthy

  live-worker-0:
    environment:
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib@sha256:4eb842091c796156d4d3c994eb22ba793590f5723719dbf6b8436cb4dfc17f48
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    volumes:
      - ./configs/observability/otel-collector.yml:/etc/otelcol-contrib/config.yml:ro
      - otel_data:/var/lib/otelcol
    expose: ["4317", "4318", "8888", "8889", "13133"]
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "components"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus@sha256:0e698e35e50d1ddc2d11a4a55b089fe62eb71358a5c204dfafd21bdf8ffe04b8
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-remote-write-receiver
    volumes:
      - ./configs/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose: ["9090"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  loki:
    image: grafana/loki@sha256:d14b3a2c419b72fe27cd094c017863bd37a5ea9ac7d72f35bcd25f5bd081dc47
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./configs/observability/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/var/loki
    expose: ["3100"]
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-config.file=/etc/loki/local-config.yaml", "-verify-config=true"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  tempo:
    image: grafana/tempo@sha256:3ecd1da98d89d49ea7ba3b0b283487e06f09ca3d9422a61fdde310f93b3e6e4d
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./configs/observability/tempo.yml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    expose: ["3200", "4317", "4318"]
    healthcheck:
      test: ["CMD", "/tempo", "-health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  grafana:
    image: grafana/grafana@sha256:6ea068891652aa6a65ca9065c26b89de939653803c836426970305c11fd00534
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_BIND_ADDRESS:-127.0.0.1}:3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped

volumes:
  otel_data:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:
